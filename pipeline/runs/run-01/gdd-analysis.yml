  - id: level-generation
    name: "Procedural level generation (seeded hybrid)"
    status: new
    risk: MEDIUM
    complexity: high
    cos_required: []
    ux_zones: {}
    affected_files:
      - <game-root>/levelgen/LevelGenerator.ts
      - <game-root>/levelgen/SolvabilityChecker.ts
      - <game-root>/levelgen/difficultyTable.ts
      - <game-root>/data/tutorial-levels.json
    dependencies: [flood-fill-group, treat-bubbles, blocker-entities]
    notes: >
      Hybrid: Tutorial levels 1-3 hand-crafted JSON. Levels 4-78 procedurally
      generated with seeded PRNG (mulberry32, seed = levelNumber * 98765 + attempt).
      5-step generation: seed init → difficulty params → grid population →
      solvability check → objective injection. 4 named rejection conditions
      (DEADLOCK, OBJECTIVE_IMPOSSIBLE, BLOCKER_SURROUNDED, OVERBUDGET).
      Fallback chain: retry x10 → reduce blockers → fallback-library JSON.
      Pure logic (no Pixi, no Math.random — seeded RNG only) → testable in
      isolation. cos_required empty because generation is infrastructure
      (PLAY phase lifecycle, not a CoS-gated surface).
      lifecycle_phase: PLAY (runs during level init, before board renders).

