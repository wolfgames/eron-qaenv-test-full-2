    dependencies: [ecs-plugin, scaffold-asset-pipeline]
    ux:
      discovery: "Grid fills center 73% of viewport — immediately visible on screen load"
      feedback: "Tap feedback within 100ms via pop burst animation; invalid tap triggers shake"
      onboarding: "Tutorial level 1 shows 5×5 subset with ghost-finger pointer cue"
    notes: >
      7 cols × 9 rows. Cell size 44pt minimum hit target, ~40pt visible bubble
      sprite. Grid scales uniformly within safe area. Top 15% HUD, bottom 12%
      companion strip + bottom 64px logo reserve. Grid fills remaining ~73%.
      At 390×844 viewport: available height ≈ 844 - 127 (HUD) - 101 (companion)
      - 64 (logo) ≈ 552px for 9 rows → ~61px per row. Width ≈ 390 / 7 ≈ 56px
      per column. Both exceed 44pt minimum. MEDIUM+ risk for viewport layout.

