      silent failures. Impacts all PLAY features.

# ---------------------------------------------------------------------------
# OPEN QUESTIONS
# ---------------------------------------------------------------------------

open_questions:
  - id: OQ-1
    question: "Should taps during ANIMATING state produce any feedback, or remain silently discarded?"
    context: >
      GDD specifies 'silently discarded' during animation lock. UX lenses.md
      rule says 'no action is silent; no outcome is ambiguous' (lens 3). The
      lenses apply to invalid actions — a tap during animation lock is not an
      invalid action but a timing issue. The GDD intent (silent discard) is
      defensible. Plan should confirm: accept GDD silent-discard or add subtle
      feedback (queue indicator dot, brief pulse).

  - id: OQ-2
    question: "What is the multiplicative scoring formula to satisfy the scoring CoS at core pass?"
    context: >
      GDD specifies star rating (cosmetic) and a basic score tally but does not
      define a multiplicative scoring formula. The scoring CoS requires ≥2
      multiplicative dimensions (base × magnitude × chain). Suggested formula:
      groupScore = (groupSize - 1) * 50; chainMultiplier = cascadeDepth + 1;
      finalScore += groupScore * chainMultiplier. Plan must confirm or adjust.

  - id: OQ-3
    question: "How does the 12% companion strip coexist with the 64px logo overlay at the bottom?"
    context: >
      Companion strip occupies bottom 12% ≈ 101px. Wolf Games logo overlay is
      ~64px at absolute bottom. If companion strip is positioned at absolute
      bottom, it overlaps the logo. Suggested resolution: companion strip sits
      at bottom-64px (just above logo). Effective companion height ≈ 37px, which
      may be too narrow for the Scooby portrait. Alternative: raise companion
      strip so it occupies the band between the grid bottom and the logo.
      Plan must define the exact pixel budget.

