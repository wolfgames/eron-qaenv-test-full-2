      onboarding: "Tutorial level 1 uses only 2 types (Snack Bone + Burger Bubble)"
    notes: >
      Mystery Glob is a wildcard type — joins any adjacent group for group-size
      calculation. Each type: colored-tint bubble + unique cartoon icon inside.
      Must distinguish types by color AND icon (UX guideline: never rely on
      color alone). 5 types across 7×9 grid meets canvas CoS minimum piece size.

