    notes: >
      GDD: 80ms per row fall, ease-out. Refill: 150ms fall-in from top, ease-out.
      Gravity does NOT pass through Stone Gargoyle cells. Pieces need stable
      identity (animated-dynamics CoS: board diff by identity, not position).
      Event queue pattern required: cells-cleared → gravity-drop → elements-entered.

