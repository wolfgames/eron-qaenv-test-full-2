  # =========================================================================
  # BATCH 3 — Flood-Fill + Tap Resolution + Input Lock + Scoring + HUD
  # P0: HOOK BATCH — first time player pops bubbles and sees score feedback
  # =========================================================================

  - id: 3
    name: "Tap Resolution + Scoring + HUD — First Rewarding Loop"
    priority: P0
    player_visible: >
      Player taps a group of 2+ matching bubbles — they pop with a burst animation,
      score increments with a +N float-up label in the HUD, move counter decrements.
      Tapping a lone bubble plays a shake animation (invalid tap). Score and moves
      displayed in top HUD strip. This is the first fully rewarding game interaction.
    features: [flood-fill-group, scoring-system, hud-renderer, objective-system, input-lock]
    cos_covered: [core-interaction, canvas, scoring]
    ux_zones:
      thumb_zone: [center, out-of-reach]
      touch_targets: [board-cell]
      feedback_surfaces: [board-canvas, hud]
    acceptance:
      # flood-fill-group
      - given: "player taps a bubble connected to 2+ matching bubbles of the same type"
        should: "flood-fill detects group; group highlights for 80ms before popping; move decrements; score adds groupScore"
      - given: "player taps a lone bubble (group size = 1)"
        should: "shake animation fires on tapped cell; no move consumed; no score change; board state unchanged"
      - given: "Mystery Glob bubble adjacent to a valid group"
        should: "Mystery Glob joins the group for size calculation; pops with the group"
      # scoring-system (multiplicative formula)
      - given: "player pops a group of 5 bubbles (cascadeDepth=0)"
        should: "score += (5-1)*50*(0+1) = 200; score signal updates via ECS bridge"
      - given: "player pops triggering a 2-level cascade"
        should: "second-level pop score multiplied by cascadeDepth+1=2 (chain multiplier applied)"
      # hud-renderer
      - given: "HUD renders at 390×844"
        should: "score label and moves-remaining label visible in top 127px strip; no overlap with board"
      - given: "moves reach 0"
        should: "move counter label pulses red (GSAP tween, 300ms); loss state evaluation triggered"
      # objective-system
      - given: "level has objective: clear 10 BURGER bubbles"
        should: "objective icon in HUD increments count each time a BURGER bubble pops; fill animation on completion"
      # input-lock
      - given: "player taps during ANIMATING phase"
        should: "tap silently discarded; board state unchanged; no error; no feedback (OQ-1 resolution)"
    test_loci:
      - describe: "boardLogic: flood-fill group detection"
        file: "tests/scooby-snacks-pop/boardLogic.test.ts"
        cases:
          - "detects connected group of same type"
          - "group size 1 returns invalid (no pop)"
          - "Mystery Glob joins adjacent group for size calculation"
          - "Mystery Glob adjacent to two types joins the larger group"
      - describe: "scoringLogic: multiplicative formula"
        file: "tests/scooby-snacks-pop/scoringLogic.test.ts"
        cases:
          - "group of 2 at cascade 0 scores 50"
          - "group of 5 at cascade 0 scores 200"
          - "group of 5 at cascade 2 scores 600 (chain multiplier x3)"
          - "star thresholds: 0% moves remaining = 1 star; 30% = 2 stars; 55% = 3 stars"
      - describe: "HudRenderer — layout and ECS bridge"
        file: "tests/scooby-snacks-pop/HudRenderer.test.ts"
        cases:
          - "score label renders in top 127px strip at 390px width"
          - "moves label pulses red GSAP tween when movesRemaining reaches 0"
          - "objective icon fill animation fires when objective count hits target"
      - describe: "GamePlugin.actions.executeTap — ECS action purity"
        file: "tests/scooby-snacks-pop/GamePlugin.test.ts"
        cases:
          - "executeTap returns group + movements + refills metadata (no Pixi calls)"
          - "tapping during ANIMATING phase returns null / no-op"
          - "invalid tap (group<2) does not decrement moves or modify board state"
    files:
      state:
        - src/game/scooby-snacks-pop/state/boardLogic.ts
        - src/game/scooby-snacks-pop/state/scoringLogic.ts
        - src/game/scooby-snacks-pop/state/GamePlugin.ts
      integration:
        - src/game/scooby-snacks-pop/renderers/HudRenderer.ts
        - src/game/scooby-snacks-pop/screens/gameController.ts
      test:
        - tests/scooby-snacks-pop/boardLogic.test.ts
        - tests/scooby-snacks-pop/scoringLogic.test.ts
        - tests/scooby-snacks-pop/HudRenderer.test.ts
        - tests/scooby-snacks-pop/GamePlugin.test.ts
    how:
      - >
        boardLogic.ts: pure functions only — no Pixi, no Math.random (seeded RNG
        passed as arg). floodFill(board, col, row, rng): returns group[], invalid
        boolean. resolveGroup(board, group): returns new board state + cleared cells.
        Mystery Glob wildcard: if adjacent to ≥1 valid group, joins largest adjacent
        group. Pure, deterministic, fully testable.
      - >
        scoringLogic.ts: pure function. computeScore(groupSize, cascadeDepth): number.
        computeStars(movesUsed, movesAllotted): 1|2|3. Both called from
        GamePlugin.actions.executeTap() and GamePlugin.actions.executeTap() returns
        animation metadata {group, movements, refills, score, stars}.
      - >
        HudRenderer: Pixi Container at y=0, height=127px. GPU-rendered (not DOM).
        ECS bridge propagates score → scoreLabel.text, movesRemaining → movesLabel.text.
        Float-up +N animation via GSAP on score delta. eventMode='none' (HUD not interactive).
        gameController.ts: pointertap callback dispatches ecsDb.actions.executeTap;
        controller receives animation metadata and plays GSAP sequences.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site: GameController.onCellTap dispatches to ecsDb.actions.executeTap"
      - "every file in files.integration exercised by at least one acceptance test"
      - "CoS sub-walk clean for core-interaction: invalid tap produces visible shake feedback; input blocked during ANIMATING"
      - "CoS sub-walk clean for scoring: perTapScore=(groupSize-1)*50*(cascadeDepth+1); ≥2 multiplicative dimensions"
      - "CoS sub-walk clean for canvas: HUD strip ≤ 127px height; no overlap with board"
      - "touch targets ≥ 44px per board cell; feedback surfaces: board-canvas (pop/shake) and hud (score float-up)"
      - "boardLogic.ts: no Math.random(), no Pixi imports (pure function invariant)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: >
      Multiple systems wired in one batch (logic + animation + HUD). Risk: ECS action
      returns animation metadata correctly but controller does not consume it (orphaned
      module). Mitigation: acceptance test asserts controller fires GSAP tween on
      executeTap return value.

  # =========================================================================
  # BATCH 4 — Gravity Refill + Cascade Animation + Animated Dynamics
  # P1: Game plays but feels empty without physics; satisfies animated-dynamics CoS
  # =========================================================================

  - id: 4
    name: "Gravity Cascade + Refill Physics"
    priority: P1
    player_visible: >
      After popping a group, bubbles above the gap fall down with 80ms/row ease-out
      physics. New bubbles fall in from the top at 150ms ease-out. Cascade chain
      (if new group forms) fires with escalating speed and visual intensity. Board
      identity stable — the same bubble sprite moves, it is not destroyed/recreated.
    features: [gravity-refill]
    cos_covered: [animated-dynamics, core-interaction]
    ux_zones:
      thumb_zone: [center]
      touch_targets: []
      feedback_surfaces: [board-canvas]
    acceptance:
      - given: "3 bubbles cleared from column"
        should: "bubbles above fall down with 80ms/row ease-out GSAP tween (not instant, not constant speed)"
      - given: "bubbles fall and settle"
        should: "each bubble plays squash/bounce on landing; magnitude scales with fall distance"
      - given: "refill triggered after fall settles"
        should: "new bubbles fall in from top at 150ms/row ease-out; board fills to 7×9"
      - given: "cascade chain depth > 1"
        should: "second cascade fires faster (< 80ms/row); board edge glows at depth 2; screen shake at depth 3+"
      - given: "gravity triggers after pop"
        should: "only moved bubbles animate (board diff by stable identity); static bubbles do not play drop animation"
      - given: "Stone Gargoyle blocker present in column"
        should: "gravity pass-through stops at Gargoyle row; bubbles above Gargoyle fall only to Gargoyle top edge"
    test_loci:
      - describe: "boardPhysics: gravity cascade and board diff"
        file: "tests/scooby-snacks-pop/boardPhysics.test.ts"
        cases:
          - "cleared cells trigger gravity drop for cells directly above"
          - "board diff: only moved cells have non-zero displacement"
          - "stable identity: same cell ID before and after gravity (not recreated)"
          - "Stone Gargoyle blocks gravity pass-through"
          - "cascade depth increments correctly after each gravity refill match"
      - describe: "BoardRenderer: cascade animation timing and escalation"
        file: "tests/scooby-snacks-pop/BoardRenderer.test.ts"
        cases:
          - "gravity tween duration = fallDistance * 80ms per row"
          - "cascade depth 1 uses standard timing; depth 2 uses reduced timing"
          - "only displaced cells receive GSAP tween (not full board re-render)"
    files:
      state:
        - src/game/scooby-snacks-pop/state/boardPhysics.ts
        - src/game/scooby-snacks-pop/state/GamePlugin.ts
      integration:
        - src/game/scooby-snacks-pop/renderers/BoardRenderer.ts
        - src/game/scooby-snacks-pop/screens/gameController.ts
      test:
        - tests/scooby-snacks-pop/boardPhysics.test.ts
        - tests/scooby-snacks-pop/BoardRenderer.test.ts
    how:
      - >
        boardPhysics.ts: applyGravity(board): returns {newBoard, drops: [{id, fromRow, toRow, col}[]},
        refills: [{id, col, fromRow}[]]}. Pure function. Stone Gargoyle: column gravity
        stops at Gargoyle y; treats above fall to Gargoyle+1. ID-stable: cell IDs
        persist through moves.
      - >
        Animation event queue in gameController.ts: executeTap returns animation event list.
        Queue processed sequentially: cells-cleared → gravity-drop → elements-entered → settle.
        GSAP timeline per event. Input locked (phase=ANIMATING) until settle event fires.
      - >
        Cascade escalation table in BoardRenderer: depth 1 = 80ms; depth 2 = 56ms (70%);
        depth 3+ = 40ms (50%). Board-edge glow Pixi Graphics tween at depth 2.
        Screen shake GSAP tween on app.stage at depth 3. Particles up to 50 pooled.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site: GameController animation event queue consumes boardPhysics output"
      - "every file in files.integration exercised by at least one acceptance test"
      - "CoS sub-walk clean for animated-dynamics: stable identity (board diff); no instant state changes; event queue present; gravity uses ease-out not constant speed; cascade escalation present"
      - "CoS sub-walk clean for core-interaction: input blocked during animation playback (ANIMATING phase)"
      - "no requestAnimationFrame — GSAP-only animation (guardrail #3)"
      - "particle count capped at 50 concurrent (guardrail #13)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: >
      Board diff by stable identity is the most commonly broken animation requirement.
      Risk: full-board re-render instead of diff. Mitigation: acceptance test asserts
      only displaced cells receive GSAP tweens.

