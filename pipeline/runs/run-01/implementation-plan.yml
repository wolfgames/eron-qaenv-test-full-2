  - id: 6
    name: "Level Generation — Procedural + Tutorial Levels"
    priority: P1
    player_visible: >
      Tutorial levels 1-3 load correctly with their specific grid layouts.
      Campaign levels 4+ generate from seeded PRNG with validated solvability.
      No 'impossible' levels ship to players. Level selection progresses sequentially.
    features: [level-generation, tutorial-levels]
    cos_covered: [core-interaction, canvas, animated-dynamics]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [board-cell]
      feedback_surfaces: [board-canvas]
    acceptance:
      # tutorial levels — real content (no placeholder per guardrail #15)
      - given: "level 1 loads (tutorial)"
        should: "5×5 grid renders with exactly 2 bubble types (SNACK_BONE, BURGER); ghost-finger pointer visible over largest cluster; move counter hidden"
      - given: "level 2 loads (tutorial)"
        should: "grid arranged to demonstrate gravity chain (column with gap exploitable by pop); Scooby dialogue cues 'Watch what happens!'"
      - given: "level 3 loads (tutorial)"
        should: "a 7-bubble group pre-placed; Scooby dialogue cues 'Tap the big group!'; Spook Bomb spawn demonstrates after tap"
      # procedural generation
      - given: "LevelGenerator.generate(levelNumber=4, seed=4*98765+0)"
        should: "returns valid 7×9 board; at least 1 solvable pop sequence exists (SolvabilityChecker.check() returns solvable=true)"
      - given: "LevelGenerator.generate() for 10 consecutive seeds"
        should: "no DEADLOCK rejection; fallback JSON used if retry limit hit; board pool length ≥ session draw count (10 levels)"
      - given: "LevelGenerator produces level with objectives"
        should: "objectives array specifies {treatKind, targetCount}; targetCount = 60-75% of that type's board presence"
    test_loci:
      - describe: "LevelGenerator: seeded procedural generation"
        file: "tests/scooby-snacks-pop/LevelGenerator.test.ts"
        cases:
          - "generate(4, seed) returns solvable board (SolvabilityChecker.check passes)"
          - "same seed always produces same board (deterministic)"
          - "DEADLOCK rejection triggers retry; max 10 retries before fallback JSON"
          - "objectives: targetCount between 60-75% of treat type presence"
          - "content-sufficiency: fallback library has ≥ 10 levels"
      - describe: "tutorial-levels.json: content validation"
        file: "tests/scooby-snacks-pop/tutorialLevels.test.ts"
        cases:
          - "tutorial level 1: 5x5 grid, exactly 2 types (SNACK_BONE BURGER), ≥1 group of 3+"
          - "tutorial level 2: grid has at least 1 exploitable gravity chain"
          - "tutorial level 3: has at least one group of 7+ same-type bubbles pre-placed"
    files:
      state:
        - src/game/scooby-snacks-pop/levelgen/LevelGenerator.ts
        - src/game/scooby-snacks-pop/levelgen/SolvabilityChecker.ts
        - src/game/scooby-snacks-pop/levelgen/difficultyTable.ts
        - src/game/scooby-snacks-pop/data/tutorial-levels.json
        - src/game/scooby-snacks-pop/data/fallback-levels.json
      integration:
        - src/game/scooby-snacks-pop/screens/gameController.ts
        - src/game/scooby-snacks-pop/renderers/TutorialOverlay.ts
      test:
        - tests/scooby-snacks-pop/LevelGenerator.test.ts
        - tests/scooby-snacks-pop/tutorialLevels.test.ts
    how:
      - >
        LevelGenerator.ts: mulberry32 PRNG seeded with levelNumber * 98765 + attempt.
        5-step generation: seedInit → difficultyParams(levelNumber) → gridPopulation →
        SolvabilityChecker.check() → objectiveInjection. 4 rejection conditions:
        DEADLOCK (no valid pop anywhere), OBJECTIVE_IMPOSSIBLE (objectives exceed board),
        BLOCKER_SURROUNDED (all treat cells blocked), OVERBUDGET (too many blockers for
        difficulty). Retry x10, then reduce blockers, then use fallback JSON.
      - >
        tutorial-levels.json: hand-authored real content (not placeholder). 3 entries.
        T1: rows: 5, cols: 5, cells: 25-cell array with SNACK_BONE/BURGER distribution
        ensuring ≥1 group of 3. T2: specific layout creating exploitable gravity chain.
        T3: specific layout with 7+ connected group pre-placed. Each level has
        {id, grid, tutorialMode: true, dialogue: "...", pointer: {col, row}}.
      - >
        TutorialOverlay.ts: GPU Pixi (not DOM). Ghost-finger: Pixi Sprite with
        pointing-finger emoji texture, animated bob GSAP yoyo. Scooby dialogue bubble:
        Pixi Graphics rounded rect + Pixi Text. Auto-dismiss after 3s or on tap.
        Tutorial flag in level config suppresses move counter in HUD.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site: GameController loads levelData from LevelGenerator/tutorial JSON before BoardRenderer.init"
      - "every file in files.integration exercised by at least one acceptance test"
      - "tutorial-levels.json contains REAL level data (no 'placeholder', 'mock', 'TBD' values)"
      - "content-sufficiency: fallback-levels.json pool.length ≥ 10 (≥ session draw count)"
      - "CoS sub-walk: tutorial level 1 uses 2 bubble types; ghost-finger pointer visible; move counter hidden"
      - "no Math.random() in LevelGenerator or SolvabilityChecker (seeded PRNG only)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: >
      Tutorial JSON is real content that must be authored correctly. Risk: invalid
      layout (no solvable group in T1, no gravity chain in T2) causes bad tutorial UX.
      Mitigation: tutorialLevels.test.ts validates structural properties of each level.

