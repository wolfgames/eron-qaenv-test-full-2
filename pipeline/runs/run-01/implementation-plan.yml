# ---------------------------------------------------------------------------
# RESOLVED OPEN QUESTIONS
# ---------------------------------------------------------------------------

resolved_questions:
  - question: "OQ-1: Should taps during ANIMATING state produce any feedback, or remain silently discarded?"
    decision: >
      Accept GDD silent-discard. The ANIMATING state itself is visible to the
      player (bubbles falling, physics playing out). A tap during this state is
      not an invalid action — it is a timing-mismatch that the visible animation
      contextualises. Lens 3 ('no action is silent') applies to invalid actions
      on an IDLE board; it does not require feedback for timing-window misses where
      the system response is already visible. Decision: silently discard taps during
      ANIMATING. No queue indicator added in core pass (deferred to secondary pass
      if playtest feedback demands it).
    rationale: >
      GDD intent is defensible. Animation as implicit feedback satisfies the spirit
      of lenses.md without adding UI complexity to the core pass.

  - question: "OQ-2: What is the multiplicative scoring formula to satisfy the scoring CoS at core pass?"
    decision: >
      groupScore = (groupSize - 1) * 50
      cascadeMultiplier = cascadeDepth + 1
      perTapScore = groupScore * cascadeMultiplier
      levelScore += perTapScore
      Star thresholds: 1★ = level complete; 2★ = ≥30% movesRemaining/movesAllotted;
      3★ = ≥55% movesRemaining/movesAllotted.
    rationale: >
      Two multiplicative dimensions (group size × cascade depth) satisfy scoring CoS
      base requirements. groupSize-1 ensures minimum-valid group (2 bubbles) scores
      1×50=50 per cascade level. A 10-bubble group in a 3-cascade chain scores
      9×50×3=1350 vs a 2-bubble single = 50×1=50. Skill ceiling ≫ floor as required.

  - question: "OQ-3: How does the 12% companion strip coexist with the 64px logo overlay at the bottom?"
    decision: >
      Companion strip sits at absolute-bottom + 64px (i.e., y = viewport_h - 64(logo) - 64(companion)).
      Companion strip height = 64px (GPU Pixi layer, not DOM overlay). Total bottom reserve
      = 128px. DOM companion strip overlap risk is eliminated by using a GPU layer at the
      correct y-offset. Logo DOM element sits at absolute bottom-8 (unchanged).
    rationale: >
      64px companion height accommodates a square Scooby portrait + dialogue bubble line.
      At 390px width, the companion strip has enough horizontal space for portrait + 3-4
      words of dialogue. Combined 128px bottom reserve leaves 589px for the 9×7 board,
      giving 65px cell height which exceeds the 44pt minimum.

