batches:

  # =========================================================================
  # BATCH 1 — ECS Plugin + GameController Foundation
  # P0: Every other feature depends on this. Hook cannot precede topology.
  # =========================================================================

  - id: 1
    name: "ECS Plugin + GameController Foundation"
    priority: P0
    player_visible: >
      Player sees blank Pixi canvas mount in place of the DOM stub. No gameplay yet,
      but the game shell no longer shows 'Gameplay Screen' h1. Aria text updates to
      'Scooby Snacks Pop — Loading'. ECS DB is live and Inspector-visible (dev only).
    features: [ecs-plugin, game-controller-stub, game-state-signals, interaction-archetype-doc]
    cos_covered: [core-interaction, animated-dynamics, scoring]
    ux_zones:
      thumb_zone: [center]
      touch_targets: []
      feedback_surfaces: [board-canvas]
    acceptance:
      # ecs-plugin
      - given: "GameController init() is called"
        should: "ECS database created with GamePlugin; resources score=0, movesRemaining=20, phase=IDLE accessible via ecsDb"
      - given: "ECS plugin resources defined"
        should: "Property order is extends→services→components→resources→archetypes→computed→transactions→actions→systems (runtime-enforced)"
      # game-controller-stub (replace)
      - given: "setupGame(deps) is called and init(container) fires"
        should: "Pixi Application mounts with gameMode='pixi'; no DOM elements created inside game container"
      - given: "GameController destroy() is called"
        should: "GSAP tweens killed, Pixi app destroyed, ECS bridge cleaned up, setActiveDb(null) called in correct order"
      # game-state-signals (adapt)
      - given: "ECS transaction addScore(100) executes"
        should: "gameState.score() reads 100 via bridgeEcsToSignals — no direct setScore call in game code"
      # interaction-archetype-doc
      - given: "src/game/scooby-snacks-pop/interaction-archetype.md exists"
        should: "Document specifies: interaction type=Tap, pointer sequence (pointerdown→record cell→pointerup→resolve), invalid gesture feedback=shake+no-move-consumed, feel description"
    test_loci:
      - describe: "ECS GamePlugin — resource shape and property order"
        file: "tests/scooby-snacks-pop/GamePlugin.test.ts"
        cases:
          - "creates DB with score=0 movesRemaining=20 phase=IDLE"
          - "plugin property order is enforced (extends before resources before actions)"
      - describe: "GameController — lifecycle and no-DOM invariant"
        file: "tests/scooby-snacks-pop/gameController.test.ts"
        cases:
          - "init mounts Pixi canvas, no DOM elements created in container"
          - "destroy kills tweens then Pixi then ECS bridge in order"
          - "ariaText signal updates on init"
      - describe: "bridgeEcsToSignals — ECS → signal propagation"
        file: "tests/scooby-snacks-pop/bridgeEcsToSignals.test.ts"
        cases:
          - "addScore transaction propagates to gameState.score() signal"
          - "decrementMoves transaction propagates to movesRemaining signal"
    files:
      state:
        - src/game/scooby-snacks-pop/state/GamePlugin.ts
        - src/game/scooby-snacks-pop/state/bridgeEcsToSignals.ts
        - src/game/scooby-snacks-pop/interaction-archetype.md
      integration:
        - src/game/scooby-snacks-pop/screens/gameController.ts
        - src/game/state.ts
        - src/game/scooby-snacks-pop/index.ts
      test:
        - tests/scooby-snacks-pop/GamePlugin.test.ts
        - tests/scooby-snacks-pop/gameController.test.ts
        - tests/scooby-snacks-pop/bridgeEcsToSignals.test.ts
    how:
      - >
        Create src/game/scooby-snacks-pop/ directory with index.ts re-exporting
        setupGame and setupStartScreen (satisfying game contract). Delete
        src/game/mygame/ or leave as tombstone; scooby-snacks-pop/ is the slug directory.
        Update src/game/index.ts to import from scooby-snacks-pop.
      - >
        Write GamePlugin.ts with ECS plugin defining: resources (score:0,
        movesRemaining:20, boardState:[], levelNumber:1, chapterNumber:1,
        starCount:0, objectives:[], phase:'IDLE'), archetypes (BubbleCell),
        transactions (replaceBoard, decrementMoves, addScore, setPhase,
        updateObjective), actions (executeTap stub — returns {group:[], movements:[],
        refills:[]}). Property order strictly: resources → archetypes → transactions → actions.
      - >
        Write gameController.ts as full Pixi GameController: init() creates ECS DB →
        setActiveDb → bridgeEcsToSignals → Pixi Application.init() → layers (bgLayer,
        boardLayer, hudLayer, uiLayer) → eventMode discipline (stage=static,
        bgLayer=none, boardLayer=passive, uiLayer=passive). destroy() follows
        GSAP→Pixi→ECS→null order. Adapt state.ts: remove direct signal writes from
        game code; keep signal interface for DOM screens; reroute writes through ECS.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at src/game/scooby-snacks-pop/screens/gameController.ts"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for cos_covered: core-interaction (interaction-archetype.md exists with all fields)"
      - "no DOM elements created inside game container (document.createElement absent from scooby-snacks-pop/)"
      - "ECS plugin property order validated (no runtime order error on DB creation)"
      - "destroy order: GSAP → Pixi → ECS bridge → setActiveDb(null)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: HIGH
    risk_reason: >
      Touches GameController (central integration point). Wrong ECS property order
      causes silent runtime failure. Wrong destroy order causes tween-fires-on-null-ref.
      Rollback: keep mygame/ scaffolding intact as fallback; scooby-snacks-pop/ is additive
      until gameController.ts swap is committed.

