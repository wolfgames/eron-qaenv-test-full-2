  # =========================================================================
  # BATCH 10 — Chapter System + Chapter Complete Screen
  # P2: Campaign structure; game plays without it in core pass testing
  # =========================================================================

  - id: 10
    name: "Chapter System + Chapter Complete Screen"
    priority: P2
    player_visible: >
      After completing level 15, chapter complete screen appears (results screen variant)
      with full-screen art, Mystery Inc. celebration text, and Next Chapter button.
      Chapter 1 interstitial appears before level 4 (first non-tutorial level).
      Chapter number tracked in ECS.
    features: [chapter-system, chapter-complete-screen]
    cos_covered: []
    ux_zones:
      thumb_zone: [center]
      touch_targets: [lets-go-button, next-chapter-button]
      feedback_surfaces: [interstitial-screen, results-screen]
    acceptance:
      - given: "player completes level 15"
        should: "chapterNumber increments in ECS; chapter complete screen variant shown in ResultsScreen"
      - given: "chapter complete screen shows"
        should: "Next Chapter button ≥ 44px in center thumb zone; auto-advances after 4s"
      - given: "player starts a new chapter (levelNumber=16, 31, etc.)"
        should: "chapter interstitial screens before first campaign level of new chapter"
      - given: "chapter 1 starts (level 4, first non-tutorial)"
        should: "chapter 1 interstitial shows haunted mansion location context; Let's Go button advances"
    test_loci:
      - describe: "chapter system — level progression and transitions"
        file: "tests/scooby-snacks-pop/chapterSystem.test.ts"
        cases:
          - "level 15 completion increments chapterNumber ECS resource"
          - "level 16 triggers chapter interstitial before game load"
          - "auto-advance fires after 4s via GSAP delayedCall"
          - "Next Chapter button ≥ 44px"
    files:
      state:
        - src/game/scooby-snacks-pop/state/GamePlugin.ts
      integration:
        - src/game/screens/ResultsScreen.tsx
        - src/game/scooby-snacks-pop/screens/gameController.ts
      test:
        - tests/scooby-snacks-pop/chapterSystem.test.ts
    how:
      - >
        GamePlugin: add chapterNumber resource. Transaction advanceChapter: increments
        chapterNumber, resets levelNumber to 1 within chapter. Action checkChapterComplete:
        returns {chapterComplete: bool, chapterNumber} after win evaluation.
      - >
        ResultsScreen.tsx: Show conditional. win-branch: if chapterComplete shows
        chapter-reveal variant (emoji chapter art + 'Chapter X Complete!' text + Next
        Chapter button). Standard win branch shown otherwise. Auto-advance via
        setTimeout is DOM-screen-OK (not game code, no animation).
      - >
        Chapter interstitial: results-screen route with interstitial=true query param.
        Full-screen: chapter emoji art + location text + Let's Go button. GameController
        fires goto('results', {interstitial: true, chapter: N}) at chapter boundary.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site: GameController fires goto with chapterComplete payload"
      - "every file in files.integration exercised by at least one acceptance test"
      - "chapter interstitial text is real copy (Chapter 1: 'The Haunted Mansion', etc.)"
      - "auto-advance uses GSAP delayedCall in GPU code; setTimeout in DOM screen (both acceptable)"
      - "Next Chapter / Let's Go buttons ≥ 44px touch targets"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: LOW
    risk_reason: "DOM screen state machine extension. Low coupling. Main risk: levelNumber counting logic off-by-one at chapter boundary."

  # =========================================================================
  # BATCH 11 — Tutorial Overlay (TutorialOverlay + in-play guidance)
  # P1: Onboarding is part of the feature — cannot ship tutorial levels without overlay
  # =========================================================================

  - id: 11
    name: "Tutorial Overlay — In-Play Guidance"
    priority: P1
    player_visible: >
      In tutorial levels, ghost-finger pointer bounces over the target cluster.
      Scooby dialogue bubble gives step guidance. Move counter and objectives hidden
      in tutorial mode. Tutorial state persisted after completion (not shown again).
    features: [tutorial-levels]
    cos_covered: [core-interaction, canvas, animated-dynamics]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [board-cell]
      feedback_surfaces: [board-canvas]
    acceptance:
      - given: "tutorial level 1 loads"
        should: "ghost-finger pointer sprite visible above the largest 2-type cluster; bounce animation (GSAP yoyo) active"
      - given: "player taps the indicated cluster"
        should: "ghost-finger disappears; Scooby dialogue updates to next instruction"
      - given: "tutorial level completes"
        should: "localStorage.setItem('scooby-snacks-pop:tutorial-complete', 'true'); tutorial overlay not shown on restart"
      - given: "tutorial mode active"
        should: "HUD move counter and objective tracker hidden (tutorial suppression flag from level config)"
    test_loci:
      - describe: "TutorialOverlay — pointer and dialogue coordination"
        file: "tests/scooby-snacks-pop/TutorialOverlay.test.ts"
        cases:
          - "pointer renders above target cell coordinates from level JSON"
          - "correct tap hides pointer and advances dialogue"
          - "tutorial-complete localStorage key set on level 3 completion"
          - "HUD suppresses move counter when tutorialMode=true"
    files:
      state: []
      integration:
        - src/game/scooby-snacks-pop/renderers/TutorialOverlay.ts
        - src/game/scooby-snacks-pop/screens/gameController.ts
      test:
        - tests/scooby-snacks-pop/TutorialOverlay.test.ts
    how:
      - >
        TutorialOverlay.ts: Pixi Container on uiLayer (top z-order). GhostFinger:
        Pixi Text "👆" at cell-center coordinates from level data. GSAP yoyo:
        gsap.to(finger, {y: finger.y - 12, duration: 0.6, yoyo: true, repeat: -1}).
        On correct tap: gsap.killTweensOf(finger), finger.destroy().
      - >
        DialogueBubble: Pixi Graphics rounded rect + Text. Receives step strings from
        level JSON {pointer: {col, row}, dialogue: ["Step 1 text", "Step 2 text"]}.
        GameController advances step index on each tutorial-valid tap.
      - >
        TutorialHudSuppression: HudRenderer checks levelData.tutorialMode before
        rendering move counter and objectives. Flag passed through GameController
        init() from level config.
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site: GameController activates TutorialOverlay when levelData.tutorialMode=true"
      - "every file in files.integration exercised by at least one acceptance test"
      - "CoS sub-walk for core-interaction: tutorial teaches the tap gesture intuitively (onboarding lens 5)"
      - "CoS sub-walk for animated-dynamics: ghost-finger animation uses GSAP yoyo (not requestAnimationFrame)"
      - "tutorial dialogue strings are real copy from level JSON (not placeholder)"
      - "no DOM elements in TutorialOverlay (Pixi GPU only per guardrail #1)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: LOW
    risk_reason: "Additive GPU overlay on existing board. No state changes. Main risk: z-order — overlay must be on uiLayer above boardLayer."
