    files:
      state:
        - src/game/scooby-snacks-pop/layout/viewport.ts
        - src/game/scooby-snacks-pop/entities/TreatBubble.ts
      integration:
        - src/game/scooby-snacks-pop/renderers/BoardRenderer.ts
        - src/game/scooby-snacks-pop/renderers/BubbleRenderer.ts
