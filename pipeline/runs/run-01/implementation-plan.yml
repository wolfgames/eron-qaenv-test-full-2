      - "CoS sub-walk clean for core-interaction: pointertap on boardLayer (not DOM); eventMode discipline (boardLayer=passive, cells=static)"
      - "touch targets ≥ 56px per viewport budget; feedback surfaces board-canvas present"
      - "screen root elements: GameController sets canvas top-padding = 127px, bottom-padding = 128px"
      - "no per-frame allocation: BubbleRenderer pre-allocates cell sprites before first render"
      - "bun run build + bun run test:run pass within 3 fix cycles"
